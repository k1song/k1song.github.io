<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<title>StockDigging — 스코어링 v2 설계서</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Noto Sans KR', sans-serif; background: #f8fafc; color: #1e293b; line-height: 1.8; display: flex; }

  /* 사이드바 */
  .sidebar {
    width: 260px; min-height: 100vh; background: #fff; border-right: 1px solid #e2e8f0;
    padding: 24px 16px; position: fixed; top: 0; left: 0; overflow-y: auto; z-index: 10;
  }
  .sidebar-title { font-size: 1.3rem; font-weight: 700; color: #0f172a; margin-bottom: 24px; padding-bottom: 12px; border-bottom: 2px solid #3b82f6; }
  .sidebar-title a { color: inherit; text-decoration: none; }
  .nav-category { font-size: 0.8rem; font-weight: 700; color: #3b82f6; letter-spacing: 0.5px; margin-top: 20px; margin-bottom: 8px; cursor: pointer; display: flex; align-items: center; justify-content: space-between; }
  .nav-category .arrow { font-size: 0.6rem; transition: transform 0.2s; }
  .nav-category.collapsed .arrow { transform: rotate(-90deg); }
  .nav-list { list-style: none; padding: 0; }
  .nav-list.collapsed { display: none; }
  .nav-item a { display: block; padding: 6px 12px; font-size: 0.9rem; color: #475569; text-decoration: none; border-radius: 6px; transition: all 0.15s; }
  .nav-item a:hover { background: #e2e8f0; color: #1e293b; }
  .nav-item a.active { background: #dbeafe; color: #1e40af; font-weight: 500; }
  .sidebar-footer { margin-top: 32px; padding-top: 16px; border-top: 1px solid #e2e8f0; font-size: 0.75rem; color: #94a3b8; }
  .sidebar-footer a { color: #64748b; text-decoration: none; }

  .page-body { margin-left: 260px; flex: 1; min-width: 0; }
  .container { max-width: 780px; margin: 0 auto; padding: 40px 24px 80px; }
  @media (max-width: 768px) { .sidebar { display: none; } .page-body { margin-left: 0; } }

  /* 헤더 */
  .hero { background: linear-gradient(135deg, #0f172a, #1e293b); color: #fff; padding: 48px 24px; text-align: center; margin-bottom: 40px; }
  .hero h1 { font-size: 2.2rem; font-weight: 900; margin-bottom: 8px; }
  .hero p { color: #94a3b8; font-size: 1rem; }
  .hero .divider { width: 50px; height: 2px; background: #3b82f6; margin: 20px auto; }
  .hero .meta { font-size: 0.8rem; color: #64748b; margin-top: 16px; }

  /* 챕터 */
  h2.chapter { font-size: 1.5rem; font-weight: 900; color: #0f172a; margin-top: 48px; margin-bottom: 8px;
    padding-bottom: 8px; border-bottom: 3px solid #3b82f6; }
  h3.section { font-size: 1.15rem; font-weight: 700; color: #1e40af; margin: 32px 0 12px; }
  h4.subsection { font-size: 1.02rem; font-weight: 700; color: #334155; margin: 24px 0 8px; }

  p { margin-bottom: 12px; }
  strong { font-weight: 700; }

  /* 테이블 */
  table { width: 100%; border-collapse: collapse; margin: 16px 0 24px; font-size: 0.9rem; }
  th { background: #1e293b; color: #fff; padding: 10px 12px; text-align: left; font-weight: 500; white-space: nowrap; }
  td { padding: 8px 12px; border-bottom: 1px solid #e2e8f0; }
  tr:hover { background: #f1f5f9; }
  tr.highlight { background: #fffbeb; }
  tr.highlight:hover { background: #fef3c7; }

  /* 코드 */
  pre { background: #0f172a; color: #e2e8f0; padding: 16px 20px; border-radius: 8px; overflow-x: auto; margin: 12px 0 20px; font-size: 0.85rem; line-height: 1.6; }
  code { font-family: 'Fira Code', 'Consolas', monospace; font-size: 0.88em; }
  p code { background: #f1f5f9; padding: 2px 6px; border-radius: 4px; color: #e11d48; }

  /* 배지 */
  .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 0.75rem; font-weight: 700; }
  .badge.new { background: #dcfce7; color: #166534; }
  .badge.changed { background: #dbeafe; color: #1e40af; }
  .badge.formula { background: #fef3c7; color: #92400e; }

  /* 결정 박스 */
  .decision-box { background: #f0fdf4; border-left: 4px solid #22c55e; padding: 16px 20px; margin: 16px 0; border-radius: 0 8px 8px 0; }
  .evidence-box { background: #eff6ff; border-left: 4px solid #3b82f6; padding: 16px 20px; margin: 16px 0; border-radius: 0 8px 8px 0; }

  ul { margin: 8px 0 16px 24px; }
  li { margin-bottom: 6px; }
  del { color: #94a3b8; }

  .footer { text-align: center; color: #94a3b8; font-size: 0.8rem; margin-top: 60px; padding-top: 20px; border-top: 1px solid #e2e8f0; }
</style>
</head>

<div id="lock-screen" style="
  display:flex; flex-direction:column; align-items:center; justify-content:center;

  <div style="text-align:center; color:#fff; margin-bottom:32px;">
    <div style="font-size:2rem; font-weight:900; margin-bottom:8px;">StockDigging</div>

  <div style="background:#1e293b; border:1px solid #334155; border-radius:12px; padding:32px; width:340px;">

      style="width:100%; padding:12px 16px; border:1px solid #475569; border-radius:8px;

    <button onclick="decrypt()"
      style="width:100%; padding:12px; background:#3b82f6; color:#fff; border:none;

    <div id="pw-error" style="color:#ef4444; font-size:0.85rem; margin-top:8px; text-align:center; display:none;">
      비밀번호가 틀렸습니다
    </div>
  </div>
</div>

function decrypt() {
  const pw = document.getElementById('pw-input').value;
  try {
    const raw = atob(PAYLOAD);
    const bytes = new Uint8Array(raw.length);
    for (let i = 0; i < raw.length; i++) bytes[i] = raw.charCodeAt(i);

    const iv = CryptoJS.lib.WordArray.create(bytes.slice(0, 16));
    const ct = CryptoJS.lib.WordArray.create(bytes.slice(16));
    const key = CryptoJS.SHA256(pw);

    const decrypted = CryptoJS.AES.decrypt(
      { ciphertext: ct }, key, { iv: iv, mode: CryptoJS.mode.CBC, padding: CryptoJS.pad.Pkcs7 }
    );

    const text = decrypted.toString(CryptoJS.enc.Utf8);
    if (!text || text.length < 10) throw new Error('bad');

    document.getElementById('lock-screen').remove();
    document.body.innerHTML = text;

    // nav.js 재실행
    const s = document.createElement('script');
    s.src = '/nav.js';
    document.body.appendChild(s);
  } catch(e) {
    document.getElementById('pw-error').style.display = 'block';
    document.getElementById('pw-input').value = '';
    document.getElementById('pw-input').focus();
  }
}
document.addEventListener('DOMContentLoaded', () => document.getElementById('pw-input').focus());
</script>

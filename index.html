<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>K1 Note</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Noto Sans KR', sans-serif; display: flex; min-height: 100vh; color: #1e293b; }

  /* 사이드바 */
  .sidebar {
    width: 260px; min-height: 100vh; background: #f8fafc; border-right: 1px solid #e2e8f0;
    padding: 24px 16px; position: fixed; top: 0; left: 0; overflow-y: auto;
  }
  .sidebar-title { font-size: 1.3rem; font-weight: 700; color: #0f172a; margin-bottom: 24px; padding-bottom: 12px; border-bottom: 2px solid #3b82f6; }
  .sidebar-title a { color: inherit; text-decoration: none; }

  .nav-category {
    font-size: 0.8rem; font-weight: 700; color: #3b82f6; text-transform: uppercase;
    letter-spacing: 0.5px; margin-top: 20px; margin-bottom: 8px; cursor: pointer;
    display: flex; align-items: center; justify-content: space-between;
  }
  .nav-category .arrow { font-size: 0.6rem; transition: transform 0.2s; }
  .nav-category.collapsed .arrow { transform: rotate(-90deg); }

  .nav-list { list-style: none; padding: 0; }
  .nav-list.collapsed { display: none; }
  .nav-item a {
    display: block; padding: 6px 12px; font-size: 0.9rem; color: #475569;
    text-decoration: none; border-radius: 6px; transition: all 0.15s;
  }
  .nav-item a:hover { background: #e2e8f0; color: #1e293b; }
  .nav-item a.active { background: #dbeafe; color: #1e40af; font-weight: 500; }

  .sidebar-footer { margin-top: 32px; padding-top: 16px; border-top: 1px solid #e2e8f0; font-size: 0.75rem; color: #94a3b8; }
  .sidebar-footer a { color: #64748b; text-decoration: none; }
  .sidebar-footer a:hover { color: #3b82f6; }

  /* 메인 */
  .main { margin-left: 260px; flex: 1; padding: 40px 48px; max-width: 900px; }
  .breadcrumb { font-size: 0.85rem; color: #94a3b8; margin-bottom: 8px; }
  .breadcrumb a { color: #3b82f6; text-decoration: none; }
  h1 { font-size: 2rem; font-weight: 700; color: #0f172a; margin-bottom: 16px; }
  h2 { font-size: 1.3rem; font-weight: 700; color: #0f172a; margin-top: 32px; margin-bottom: 12px; }
  p { margin-bottom: 12px; line-height: 1.8; }
  a { color: #3b82f6; }
  .card-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 24px; }
  .card {
    border: 1px solid #e2e8f0; border-radius: 8px; padding: 20px;
    transition: all 0.2s; text-decoration: none; color: inherit;
  }
  .card:hover { border-color: #3b82f6; box-shadow: 0 2px 8px rgba(59,130,246,0.1); }
  .card-title { font-weight: 700; font-size: 1rem; margin-bottom: 6px; color: #0f172a; }
  .card-desc { font-size: 0.85rem; color: #64748b; }
  .card-date { font-size: 0.75rem; color: #94a3b8; margin-top: 8px; }

  /* 모바일 */
  @media (max-width: 768px) {
    .sidebar { display: none; }
    .main { margin-left: 0; padding: 24px 16px; }
    .card-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<nav class="sidebar"></nav>

<main class="main">
  <h1>K1 Note</h1>
  <p>문서 모음</p>

  <h2>StockDigging</h2>
  <div class="card-grid">
    <a class="card" href="docs/stockdigging/ir.html">
      <div class="card-title">사업 소개서 (IR)</div>
      <div class="card-desc">투자자 성향 맞춤형 종목 스코어링 플랫폼 — 사업 모델, 검증, 제안</div>
      <div class="card-date">2026 Q1</div>
    </a>
    <a class="card" href="docs/stockdigging/rebuttal.html">
      <div class="card-title">외부 비판 검토 및 대응</div>
      <div class="card-desc">"StockDigging 사업화의 현실" 비판에 대한 항목별 수용/반박 정리</div>
      <div class="card-date">2026 Q1</div>
    </a>
    <!--
    <a class="card" href="#">
      <div class="card-title">다음 문서 제목</div>
      <div class="card-desc">설명</div>
      <div class="card-date">날짜</div>
    </a>
    -->
  </div>
</main>

<script src="/nav.js"></script>
</body>
</html>
